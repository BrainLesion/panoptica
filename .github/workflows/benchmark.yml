name: benchmark

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Configure poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade poetry
          python -m poetry config installer.max-workers 1

      - name: Install dependencies
        run: python -m poetry install --with test

      - name: Benchmark HEAD
        run: python -m poetry run python benchmark/bench_eval.py --quick --json head.json

      - name: Compare against committed baseline
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -o pipefail
          python -m poetry run python benchmark/compare.py \
            benchmark/baseline.json head.json \
            --fail-on-regression-pct 50 \
            | tee comparison.md
          compare_status=${PIPESTATUS[0]}
          {
            echo "# Benchmark comparison"
            echo ""
            echo "Baseline is the committed \`benchmark/baseline.json\`. Refresh with:"
            echo ""
            echo '```'
            echo 'python benchmark/bench_eval.py --quick --json benchmark/baseline.json'
            echo '```'
            echo ""
            cat comparison.md
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$compare_status"

      - name: Head-only summary (workflow_dispatch)
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "# Benchmark (head only)"
            echo ""
            echo '```json'
            cat head.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            head.json
            comparison.md
          if-no-files-found: ignore
