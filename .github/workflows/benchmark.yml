name: benchmark

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: benchmark-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Configure poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade poetry
          python -m poetry config installer.max-workers 1

      - name: Install dependencies
        run: python -m poetry install --with test

      - name: Benchmark HEAD
        run: python -m poetry run python benchmark/bench_eval.py --quick --json head.json

      - name: Benchmark baseline (main's panoptica, HEAD's benchmark harness)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          # Save HEAD's panoptica source so we can restore it before the compare step.
          # We swap only the panoptica/ tree; benchmark/ stays from HEAD so JSON schema,
          # warmup, repeats, and CLI flags stay identical between baseline and head runs.
          cp -a panoptica /tmp/panoptica-head
          # Nuke first, then repopulate from base — otherwise `git checkout base --`
          # leaves behind files new in HEAD (e.g. panoptica/utils/speed_toggles.py)
          # and the resulting mix crashes with TypeError on unknown kwargs.
          rm -rf panoptica
          git checkout ${{ github.event.pull_request.base.sha }} -- panoptica
          python -m poetry run python benchmark/bench_eval.py --quick --json baseline.json
          rm -rf panoptica
          cp -a /tmp/panoptica-head panoptica

      - name: Compare against on-runner baseline
        id: compare
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set +e
          python -m poetry run python benchmark/compare.py \
            baseline.json head.json \
            --fail-on-regression-pct 50 \
            > comparison.md
          compare_status=$?
          echo "compare_status=$compare_status" >> "$GITHUB_OUTPUT"
          {
            echo "# Benchmark comparison"
            echo ""
            cat comparison.md
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Post/update PR comment
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('comparison.md', 'utf8');
            } catch (e) {
              core.warning(`comparison.md missing (${e.message}); skipping PR comment.`);
              return;
            }
            const marker = '<!-- panoptica-benchmark -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }

      - name: Fail on regression
        if: github.event_name == 'pull_request'
        shell: bash
        run: exit "${{ steps.compare.outputs.compare_status }}"

      - name: Head-only summary (workflow_dispatch)
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "# Benchmark (head only)"
            echo ""
            echo "Compared against the committed \`benchmark/baseline.json\` for reference:"
            echo ""
            python -m poetry run python benchmark/compare.py benchmark/baseline.json head.json || true
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            head.json
            baseline.json
            comparison.md
          if-no-files-found: ignore
