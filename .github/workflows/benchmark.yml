name: benchmark

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Configure poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade poetry
          python -m poetry config installer.max-workers 1

      - name: Install dependencies
        run: python -m poetry install --with test

      - name: Benchmark HEAD
        run: python -m poetry run python benchmark/bench_eval.py --quick --json head.json

      - name: Compare against committed baseline
        id: compare
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set +e
          python -m poetry run python benchmark/compare.py \
            benchmark/baseline.json head.json \
            --fail-on-regression-pct 50 \
            > comparison.md
          compare_status=$?
          echo "compare_status=$compare_status" >> "$GITHUB_OUTPUT"
          {
            echo "# Benchmark comparison"
            echo ""
            cat comparison.md
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Post/update PR comment
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('comparison.md', 'utf8');
            } catch (e) {
              core.warning(`comparison.md missing (${e.message}); skipping PR comment.`);
              return;
            }
            const marker = '<!-- panoptica-benchmark -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }

      - name: Fail on regression
        if: github.event_name == 'pull_request'
        shell: bash
        run: exit "${{ steps.compare.outputs.compare_status }}"

      - name: Head-only summary (workflow_dispatch)
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "# Benchmark (head only)"
            echo ""
            echo '```json'
            cat head.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            head.json
            comparison.md
          if-no-files-found: ignore
