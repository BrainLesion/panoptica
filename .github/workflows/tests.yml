# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade poetry
      - name: Install lint tools
        run: python -m poetry install --only lint --no-root
      - name: Ruff lint
        run: python -m poetry run ruff check panoptica/

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade poetry
      - name: Install lint tools
        run: python -m poetry install --only lint --no-root
      - name: Ruff format check
        run: python -m poetry run ruff format --check panoptica/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade poetry
      - name: Install dependencies
        run: python -m poetry install --with lint
      - name: Mypy
        run: python -m poetry run mypy panoptica/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Configure poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade poetry
          python -m poetry config installer.max-workers 1 
      - name: Install dependencies
        run: |
          python -m poetry install --with test
      - name: Test with pytest and create coverage report
        run: |
          python -m poetry run coverage run --source=panoptica -m pytest
          python -m poetry run coverage xml
      - name: Upload coverage results to Codecov (Only on merge to main)
        # Only upload to Codecov after a merge to the main branch
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}