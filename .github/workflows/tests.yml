# Lint, format, type-check and test with uv (astral-sh/setup-uv).
# uv resolves the project + the `dev` dependency-group on demand; `uv run`
# creates/updates the environment before running each tool.

name: tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Ruff lint
        run: uv run ruff check panoptica/

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Ruff format check
        run: uv run ruff format --check panoptica/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Pyrefly
        run: uv run pyrefly check

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Test with pytest and create coverage report
        run: |
          uv run --python ${{ matrix.python-version }} --with coverage coverage run --source=panoptica -m pytest
          uv run --python ${{ matrix.python-version }} --with coverage coverage xml
      - name: Upload coverage results to Codecov (Only on merge to main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
