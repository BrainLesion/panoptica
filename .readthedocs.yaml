version: 2

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.10"
  jobs:
    # Install uv, then sync the project + the `docs` dependency-group into the
    # Read the Docs virtualenv.
    post_create_environment:
      - pip install uv
    post_install:
      - VIRTUAL_ENV=$READTHEDOCS_VIRTUALENV_PATH uv sync --active --group docs

sphinx:
  configuration: docs/source/conf.py
